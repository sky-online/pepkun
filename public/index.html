<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ ペップ君</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#f0f4f8;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ─── Header ─────────────────────────────────── */
.app-header{background:#1a1a6e;color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20}
.logo{font-size:18px;font-weight:900;letter-spacing:1px}.logo span{color:#e63329}
.logo-sub{font-size:10px;opacity:.65;margin-top:1px}
.team-badge{font-size:12px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;border:1px solid rgba(255,255,255,.25)}
.header-right{display:flex;align-items:center;gap:10px}
.btn-reset{font-size:11px;background:none;border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:3px 10px;cursor:pointer;color:rgba(255,255,255,.75);font-family:inherit;transition:all .2s}
.btn-reset:hover{background:rgba(255,255,255,.1);color:#fff}

/* ─── Mobile tabs ────────────────────────────── */
.mobile-tabs{display:none;background:#fff;border-bottom:2px solid #e0e6f0;flex-shrink:0}
.mobile-tab{flex:1;padding:10px 4px;border:none;background:none;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;transition:color .15s,border-color .15s}
.mobile-tab.active{color:#1a1a6e;border-bottom-color:#1a1a6e;background:#f5f7ff}

/* ─── Layout ─────────────────────────────────── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ─── Chat panel ──────────────────────────────── */
.chat-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #e0e6f0;background:#fff}
.messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px}
.bubble-row{display:flex;align-items:flex-end;gap:7px}
.bubble-row.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar.coach{background:#1a1a6e;color:#fff}
.avatar.user{background:#e63329;color:#fff}
.bubble{max-width:78%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.65;word-break:break-word}
.bubble.coach{background:#f5f7ff;color:#333;border-bottom-left-radius:3px;border:1px solid #e8ecf8}
.bubble.user{background:#1a1a6e;color:#fff;border-bottom-right-radius:3px}
.typing-indicator{display:flex;gap:4px;padding:9px 12px;background:#f5f7ff;border-radius:14px;border-bottom-left-radius:3px;border:1px solid #e8ecf8}
.dot{width:6px;height:6px;background:#aaa;border-radius:50%;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ─── Input ──────────────────────────────────── */
.input-area{padding:10px 12px;border-top:1px solid #f0f0f0;flex-shrink:0}
.input-row{display:flex;gap:7px;background:#f5f7ff;border-radius:20px;padding:7px 7px 7px 14px;align-items:flex-end;border:1px solid #e0e6f0}
.msg-input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;resize:none;max-height:100px;line-height:1.5;background:transparent}
.send-btn{width:34px;height:34px;background:#e63329;border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.send-btn:hover{background:#c0271f}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.mic-btn{width:34px;height:34px;background:none;border:1.5px solid #ddd;border-radius:50%;color:#aaa;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;line-height:1}
.mic-btn:hover{border-color:#1a1a6e;color:#1a1a6e;background:#f0f4ff}
.mic-btn.active{background:#e63329;border-color:#e63329;color:#fff;animation:micpulse 1s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(230,51,41,.4)}50%{box-shadow:0 0 0 7px rgba(230,51,41,0)}}

/* ─── Generating bar ─────────────────────────── */
.generating-bar{display:none;background:#e8f4fd;border:1px solid #90caf9;border-radius:9px;padding:10px 14px;text-align:center;font-size:12px;color:#1565c0;margin:6px 12px;flex-shrink:0}
.generating-bar.show{display:block}
.spinner-sm{display:inline-block;width:12px;height:12px;border:2px solid #90caf9;border-top-color:#1565c0;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Menu panel ─────────────────────────────── */
.menu-panel{flex:1;display:flex;flex-direction:column;background:#f8fafc;overflow:hidden}
.menu-panel-tabs{display:flex;background:#fff;border-bottom:2px solid #e0e6f0;padding:0 16px;flex-shrink:0}
.menu-tab{padding:10px 16px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
.menu-tab:hover{color:#555}
.menu-tab.active{color:#1a1a6e;border-bottom-color:#1a1a6e}
.tab-cnt{display:inline-flex;align-items:center;justify-content:center;background:#e63329;color:#fff;border-radius:9px;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;margin-left:4px}
.menu-content{flex:1;overflow-y:auto;padding:18px}
.menu-content.hidden{display:none}

/* ─── Empty state ────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-size:14px;font-weight:700;margin-bottom:6px;color:#aaa}
.empty-sub{font-size:12px;line-height:1.8}
.quick-themes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.quick-theme{background:#eef0fb;color:#1a1a6e;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid #c5cae9;transition:all .2s}
.quick-theme:hover{background:#1a1a6e;color:#fff}

/* ─── Session / Drill styles ─────────────────── */
.session-header{background:linear-gradient(135deg,#1a1a6e,#2a2aae);color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.session-title{font-size:16px;font-weight:900;margin-bottom:7px}
.session-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;opacity:.85}
.meta-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:2px 9px}
.narrative{background:#fffbf0;border-left:4px solid #f5a623;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#555;line-height:1.7;margin-bottom:12px}
.drill-card{background:#fff;border-radius:10px;box-shadow:0 1px 7px rgba(0,0,0,.07);overflow:hidden;margin-bottom:10px}
.drill-header{display:flex;align-items:center;gap:7px;padding:9px 13px;border-bottom:1px solid #eee}
.phase-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.phase-warmup{background:#fff3e0;color:#e65100}
.phase-technical{background:#e8f5e9;color:#2e7d32}
.phase-tactical{background:#e3f2fd;color:#1565c0}
.phase-game{background:#fce4ec;color:#c62828}
.drill-name{font-weight:700;font-size:13px;flex:1}
.drill-time{font-size:11px;color:#888;white-space:nowrap}
.drill-body{padding:11px 13px}
.drill-cols{display:flex;flex-direction:column;gap:10px}
.drill-section{margin-bottom:7px}
.section-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:2px}
.section-content{font-size:12px;color:#333;line-height:1.6}
.coaching-focus{background:#f0f4ff;border-radius:6px;padding:6px 10px;font-size:11px;color:#1a1a6e;margin-top:5px}
.connection-note{background:#f9f9f9;border-left:3px solid #4caf50;padding:6px 10px;font-size:11px;color:#555;border-radius:0 5px 5px 0;margin-top:8px}
.drill-diagram{width:100%;max-width:480px;margin:0 auto}
.diagram-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px;text-align:center}
.voice-cues{background:#e8f5e9;border-radius:8px;padding:10px 12px;margin-top:8px}
.voice-cues-title{font-size:10px;font-weight:700;color:#2e7d32;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.voice-cue-item{font-size:12px;color:#1b5e20;padding:3px 0;border-bottom:1px solid rgba(46,125,50,.12);line-height:1.5}
.voice-cue-item:last-child{border-bottom:none}
.voice-cue-item::before{content:'💬 '}
.troubleshoot{background:#fff8e1;border-radius:8px;padding:10px 12px;margin-top:8px}
.troubleshoot-title{font-size:10px;font-weight:700;color:#e65100;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.trouble-item{margin-bottom:8px;font-size:12px;line-height:1.55}
.trouble-item:last-child{margin-bottom:0}
.trouble-problem{color:#bf360c;font-weight:700;margin-bottom:2px}
.trouble-problem::before{content:'⚠️ '}
.trouble-solution{color:#555;padding-left:4px}
.trouble-solution::before{content:'→ '}
.freeze-section{background:#e3f2fd;border-radius:8px;padding:10px 12px;margin-top:8px}
.freeze-title{font-size:10px;font-weight:700;color:#1565c0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.freeze-item{margin-bottom:8px;font-size:12px;line-height:1.55}
.freeze-item:last-child{margin-bottom:0}
.freeze-trigger{color:#0d47a1;font-weight:700;margin-bottom:2px}
.freeze-trigger::before{content:'🛑 '}
.freeze-coaching{color:#555;padding-left:4px}
.freeze-coaching::before{content:'📢 '}
.coaching-points-card{background:#1a1a6e;color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:12px}
.coaching-points-card h3{font-size:11px;margin-bottom:9px;opacity:.75}
.cp-item{margin-bottom:8px}
.cp-point{font-weight:700;font-size:13px;margin-bottom:3px}
.cp-phrase{font-size:11px;opacity:.8}
.cp-phrase::before{content:'💬 '}
.result-actions{display:flex;gap:8px;margin-bottom:20px}
.btn-save{flex:1;background:#4caf50;color:#fff;border:none;border-radius:7px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#388e3c}
.btn-save:disabled{background:#aaa;cursor:not-allowed}
.btn-pdf{flex:1;background:#455a64;color:#fff;border:none;border-radius:7px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pdf:hover{background:#263238}
.btn-new{flex:1;background:#1a1a6e;color:#fff;border:none;border-radius:7px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-new:hover{background:#0d0d4f}

/* ─── History ────────────────────────────────── */
.history-list{display:flex;flex-direction:column;gap:7px}
.history-item{background:#fff;border-radius:10px;padding:12px 14px;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.06);transition:box-shadow .15s}
.history-item:hover{box-shadow:0 2px 10px rgba(0,0,0,.1)}
.history-title{font-weight:700;font-size:13px;color:#1a1a6e;margin-bottom:3px}
.history-meta{font-size:11px;color:#888}
.doc-section-title{font-size:12px;font-weight:700;color:#1a1a6e;border-left:3px solid #e63329;padding-left:8px;margin-bottom:12px}

/* ─── Modal ──────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;margin:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-weight:900;font-size:14px;color:#1a1a6e}
.btn-modal-close{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-modal-pdf{background:#455a64;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* ─── Toast ──────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a6e;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Usage banner ───────────────────────────── */
.usage-banner{background:#fff;border-bottom:1px solid #e0e6f0;padding:6px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:12px}
.usage-left{color:#555}
.usage-bar-wrap{width:80px;height:5px;background:#eee;border-radius:3px;display:inline-block;vertical-align:middle;margin:0 7px}
.usage-bar{height:5px;border-radius:3px;background:#1a1a6e;transition:width .3s}
.usage-bar.warn{background:#e63329}
.usage-pro-btn{background:#1a1a6e;color:#fff;border:none;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.usage-pro-btn:hover{background:#0d0d4f}
.usage-banner.hidden{display:none}

/* ─── Suggestion buttons ─────────────────────── */
.suggestions-row{display:flex;flex-wrap:wrap;gap:6px;margin:-2px 0 6px 35px}
.suggestion-btn{background:#f0f4ff;border:1px solid #c5cae9;border-radius:16px;padding:5px 12px;font-size:12px;font-weight:600;color:#1a1a6e;cursor:pointer;transition:all .2s;font-family:inherit}
.suggestion-btn:hover{background:#1a1a6e;color:#fff;border-color:#1a1a6e}

/* ─── Team badge clickable ───────────────────── */
.team-badge{cursor:pointer;transition:background .2s}
.team-badge:hover{background:rgba(255,255,255,.25)}
.team-badge::after{content:' ›';opacity:.55;font-weight:300;font-size:13px}

/* ─── Profile panel ──────────────────────────── */
.profile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;justify-content:flex-end;overflow-y:auto}
.profile-overlay.show{display:flex}
.profile-panel{background:#fff;width:300px;max-width:92vw;min-height:100%;overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.15);animation:slideIn .22s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.pp-head{background:#1a1a6e;color:#fff;padding:18px 18px 14px;flex-shrink:0}
.pp-close{float:right;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;line-height:26px;text-align:center;font-family:inherit}
.pp-coach-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.pp-coach-avatar{width:44px;height:44px;border-radius:50%;background:#e63329;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp-coach-name{font-size:15px;font-weight:900}
.pp-coach-role{font-size:11px;opacity:.72;margin-top:2px}
.pp-body{padding:16px;flex:1}
.pp-section{margin-bottom:14px}
.pp-section-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;border-bottom:1px solid #f0f0f0;padding-bottom:5px}
.pp-item{margin-bottom:7px}
.pp-label{font-size:10px;color:#999;margin-bottom:2px}
.pp-value{font-size:12px;color:#333;font-weight:600;line-height:1.5}
.pp-chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px 2px 0 0}
.pp-chip-green{background:#e8f5e9;color:#2e7d32}
.pp-chip-yellow{background:#fff8e1;color:#e65100}
.pp-empty{font-size:12px;color:#bbb;text-align:center;padding:20px;line-height:1.8}

/* ─── Onboarding overlay ─────────────────────── */
.ob-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,110,.88);z-index:300;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.ob-overlay.show{display:flex}
.ob-card{background:#fff;border-radius:20px;max-width:400px;width:100%;padding:28px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:obIn .3s ease;margin:auto}
@keyframes obIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ob-progress{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:22px}
.ob-step{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#ccc;transition:all .25s}
.ob-step.active{border-color:#1a1a6e;background:#1a1a6e;color:#fff}
.ob-step.done{border-color:#4caf50;background:#4caf50;color:#fff}
.ob-line{width:28px;height:2px;background:#eee}
.ob-icon{font-size:40px;text-align:center;margin-bottom:8px}
.ob-title{font-size:16px;font-weight:900;color:#1a1a6e;text-align:center;margin-bottom:4px}
.ob-subtitle{font-size:12px;color:#888;text-align:center;margin-bottom:16px;line-height:1.6}
.ob-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ob-choice{background:#f5f7ff;border:1.5px solid #e0e6f0;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:#333;cursor:pointer;text-align:left;font-family:inherit;transition:all .18s}
.ob-choice:hover{border-color:#1a1a6e;color:#1a1a6e;background:#eef0fb}
.ob-choice.selected{border-color:#1a1a6e;background:#1a1a6e;color:#fff}
.ob-or{font-size:11px;color:#ccc;text-align:center;margin:6px 0}
.ob-input{width:100%;border:1.5px solid #e0e6f0;border-radius:10px;padding:10px 14px;font-size:13px;font-family:inherit;outline:none;transition:border .18s;box-sizing:border-box}
.ob-input:focus{border-color:#1a1a6e}
.ob-next{width:100%;margin-top:16px;background:#e63329;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;transition:background .2s}
.ob-next:hover:not(:disabled){background:#c0271f}
.ob-next:disabled{background:#ccc;cursor:not-allowed}

/* ─── Mobile ─────────────────────────────────── */
@media(min-width:768px){
  .chat-panel,.menu-panel{display:flex !important}
}
@media(max-width:767px){
  .mobile-tabs{display:flex}
  .app-body{flex-direction:column}
  .chat-panel{width:100%;border-right:none;flex:1}
  .menu-panel{flex:1}
  .chat-panel.mob-hidden{display:none !important}
  .menu-panel.mob-hidden{display:none !important}
  .modal-overlay{padding:8px}
  .modal{max-height:94vh}
  .toast{bottom:20px}
}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="logo">⚽ペップ<span>君</span></div>
    <div class="logo-sub">AIサッカーチームサポート</div>
  </div>
  <div class="header-right">
    <button class="btn-reset" onclick="resetConversation()">🔄 新しく作る</button>
    <div id="teamBadge" class="team-badge" onclick="showProfile()" title="プロフィールを見る">チーム未設定</div>
  </div>
</header>

<div class="usage-banner hidden" id="usageBanner">
  <span class="usage-left" id="usageText">今月の残り回数を確認中...</span>
  <button class="usage-pro-btn" onclick="showUpgradeModal()">⭐ Pro 500円/月</button>
</div>

<div class="mobile-tabs">
  <button class="mobile-tab active" id="tab-chat" onclick="switchMobileTab('chat')">💬 コーチ</button>
  <button class="mobile-tab" id="tab-menu" onclick="switchMobileTab('menu')">⚽ メニュー</button>
</div>

<div class="app-body">

  <!-- ─── Chat panel ─────────────────────────── -->
  <div class="chat-panel" id="chatPanel">
    <div class="messages" id="messages"></div>
    <div class="generating-bar" id="generatingBar">
      <span class="spinner-sm"></span>ペップ君がメニューを設計しています（10〜20秒）...
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="今日の練習テーマを教えてください…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- ─── Menu panel ─────────────────────────── -->
  <div class="menu-panel" id="menuPanel">
    <div class="menu-panel-tabs">
      <button class="menu-tab active" id="menuTabCurrent" onclick="switchMenuTab('current')">📝 今のメニュー</button>
      <button class="menu-tab" id="menuTabHistory" onclick="switchMenuTab('history')">
        💾 保存済み<span class="tab-cnt" id="historyCnt" style="display:none"></span>
      </button>
    </div>
    <div id="menuCurrent" class="menu-content">
      <div class="empty-state">
        <div class="empty-icon">⚽</div>
        <div class="empty-title">専属コーチに話しかけてみよう</div>
        <div class="empty-sub">チームのことを教えると<br>練習メニューをすぐに作れます</div>
        <div class="quick-themes">
          <span class="quick-theme" onclick="quickSend('ビルドアップ')">ビルドアップ</span>
          <span class="quick-theme" onclick="quickSend('ドリブル突破')">ドリブル突破</span>
          <span class="quick-theme" onclick="quickSend('プレス・守備組織')">プレス・守備</span>
          <span class="quick-theme" onclick="quickSend('パスワーク')">パスワーク</span>
          <span class="quick-theme" onclick="quickSend('トランジション')">トランジション</span>
          <span class="quick-theme" onclick="quickSend('フィニッシュ')">フィニッシュ</span>
        </div>
      </div>
    </div>
    <div id="menuHistory" class="menu-content hidden"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Onboarding overlay -->
<div class="ob-overlay" id="obOverlay">
  <div class="ob-card">
    <div class="ob-progress">
      <div class="ob-step" id="ob-s1">1</div>
      <div class="ob-line"></div>
      <div class="ob-step" id="ob-s2">2</div>
      <div class="ob-line"></div>
      <div class="ob-step" id="ob-s3">3</div>
      <div class="ob-line"></div>
      <div class="ob-step" id="ob-s4">4</div>
    </div>
    <div class="ob-icon" id="ob-icon">👤</div>
    <div class="ob-title" id="ob-title"></div>
    <div class="ob-subtitle" id="ob-subtitle"></div>
    <div class="ob-choices" id="ob-choices"></div>
    <div class="ob-or">または自由に入力</div>
    <input class="ob-input" id="ob-input" placeholder="" oninput="updateNextBtn()">
    <button class="ob-next" id="ob-next" onclick="nextObStep()" disabled>次へ →</button>
  </div>
</div>

<!-- Profile panel -->
<div class="profile-overlay" id="profileOverlay" onclick="closeProfileOverlay(event)">
  <div class="profile-panel">
    <div class="pp-head">
      <button class="pp-close" onclick="closeProfileDirect()">✕</button>
      <div style="font-size:11px;opacity:.7;font-weight:700">専属コーチ プロフィール</div>
      <div class="pp-coach-row" id="ppCoachRow"></div>
    </div>
    <div class="pp-body" id="ppBody">
      <div class="pp-empty">プロフィールを読み込み中...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-modal-pdf" onclick="downloadPDF(modalSession)">📄 PDF</button>
        <button class="btn-modal-close" onclick="closeModalDirect()">閉じる</button>
      </div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let isWaiting = false;
let lastMenuSession = null;
let lastMenuParams = null;
let modalSession = null;
let currentProfile = null;
let currentUid = null;
let recognition = null;
let micActive = false;

const PHASE_LABEL = {
  warmup:    { label: 'ウォームアップ', cls: 'phase-warmup' },
  technical: { label: 'テクニカル',     cls: 'phase-technical' },
  tactical:  { label: 'グループ戦術',   cls: 'phase-tactical' },
  game:      { label: 'ゲーム',         cls: 'phase-game' },
  cooldown:  { label: 'クールダウン',   cls: 'phase-warmup' },
};

// ─── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadProfile();
  await loadUsage();
  loadMenuHistory();
  document.getElementById('msgInput').focus();
});

// モバイルキーボードが出たとき、フォーカス中の入力欄をスクロールして見えるようにする
document.addEventListener('focusin', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    setTimeout(() => e.target.scrollIntoView({ block: 'center', behavior: 'smooth' }), 350);
  }
});

// dvh未対応ブラウザ向け: キーボード表示時にbodyの高さをvisualViewportに合わせる
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
  });
}

async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    const json = await res.json();
    currentProfile = json.profile;
    updateTeamBadge(currentProfile);
    if (!currentProfile || !currentProfile.setupDone) {
      showOnboarding();
    } else {
      showGreeting(currentProfile);
    }
  } catch {
    showGreeting(null);
  }
}

function showGreeting(profile) {
  const coachName     = profile?.coachName     || 'ペップコーチ';
  const userCoachName = profile?.userCoachName || 'コーチ';
  if (profile?.teamName) {
    const sessionInfo = profile.sessionCount > 0 ? `（${profile.sessionCount}回目）` : '';
    const lastInfo = profile.lastTheme ? `前回は「${profile.lastTheme}」をやりました。` : '';
    addMessage('coach', `${userCoachName}、${coachName}です！${profile.teamName}${sessionInfo}、お疲れ様です！${lastInfo}\n\n今日のテーマは何にしますか？`, null);
  } else {
    addMessage('coach', `${userCoachName}、${coachName}です！⚽\n\nチーム名と対象年代を教えてください。すぐに練習メニューを作れます！\n\n🎙️ マイクボタンで音声入力もできます。`, null);
  }
}

function updateTeamBadge(profile) {
  const badge = document.getElementById('teamBadge');
  badge.textContent = profile?.teamName ? '⚽ ' + profile.teamName : 'チーム未設定';
}

async function loadUsage() {
  try {
    const res  = await fetch('/api/me');
    const json = await res.json();
    if (!json.ok) return;
    currentUid = json.uid;
    updateUsageBanner(json.used, json.limit, json.isPro);
  } catch {}
}

function updateUsageBanner(used, limit, isPro) {
  const banner    = document.getElementById('usageBanner');
  const textEl    = document.getElementById('usageText');
  const proBtn    = document.querySelector('.usage-pro-btn');
  const remaining = Math.max(0, limit - used);
  const pct = Math.min(100, (used / limit) * 100);

  const barColor = pct >= 80 ? 'warn' : '';
  textEl.innerHTML = `今月 <span class="usage-bar-wrap"><span class="usage-bar ${barColor}" style="width:${pct}%"></span></span> <strong>${remaining}回</strong>残り${isPro ? '（Pro）' : '（無料）'}`;
  banner.classList.remove('hidden');
  if (proBtn) proBtn.style.display = (!isPro && remaining === 0) ? '' : 'none';
}

function showUpgradeModal() {
  const uid = currentUid || '';
  const base = 'https://buy.stripe.com/test_9B614mcxl5teg03gk0gUM00';
  window.open(uid ? `${base}?client_reference_id=${uid}` : base, '_blank');
}

// ─── Chat ───────────────────────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || isWaiting) return;
  inp.value = '';
  autoResize(inp);

  addMessage('user', text);
  setWaiting(true);
  showTyping();

  let generateParams = null;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const json = await res.json();
    hideTyping();
    if (!json.ok) throw new Error(json.error);

    addMessage('coach', json.message, json.suggestions);

    if (json.profile) {
      currentProfile = json.profile;
      updateTeamBadge(json.profile);
    }
    generateParams = json.generateParams;
  } catch (e) {
    hideTyping();
    addMessage('coach', 'エラーが発生しました: ' + e.message);
    setWaiting(false);
    return;
  }

  if (generateParams) {
    await doGenerate(generateParams);
  } else {
    setWaiting(false);
  }
}

function quickSend(theme) {
  const inp = document.getElementById('msgInput');
  inp.value = theme + 'のメニューを作ってください';
  sendMessage();
}

async function doGenerate(params) {
  document.getElementById('generatingBar').classList.add('show');
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    const json = await res.json();
    if (!json.ok) {
      if (json.limitReached) {
        addMessage('coach', `⚠️ ${json.error}\n\n引き続きご利用いただくには「⭐ Pro 500円/月」をご検討ください。`);
        showUpgradeModal();
        return;
      }
      throw new Error(json.error);
    }
    lastMenuParams  = params;
    lastMenuSession = json.data.session;
    renderMenuResult(json.data.session);
    const coachName = currentProfile?.coachName || 'コーチ';
    const remainMsg = json.remaining !== undefined ? `（今月残り${json.remaining}回）` : '';
    addMessage('coach', `✅ 「${params.theme}」のメニューができました！右のパネルをご確認ください。${remainMsg}\n\n調整したい点があれば何でも聞いてください。`);
    if (json.used !== undefined) updateUsageBanner(json.used, json.limit, json.isPro);
    // 生成成功後にプロフィールを手元でも更新
    if (currentProfile) {
      currentProfile.lastTheme = params.theme;
      currentProfile.sessionCount = (currentProfile.sessionCount || 0) + 1;
    }
    // モバイル: メニューパネルへ切り替え
    if (window.innerWidth < 768) switchMobileTab('menu');
  } catch (e) {
    addMessage('coach', 'メニュー生成でエラーが発生しました: ' + e.message);
  } finally {
    document.getElementById('generatingBar').classList.remove('show');
    setWaiting(false);
  }
}

async function resetConversation() {
  if (!confirm('新しいセッションを始めますか？（チーム情報は引き継がれます）')) return;
  try { await fetch('/api/coach/history', { method: 'DELETE' }); } catch {}
  document.getElementById('messages').innerHTML = '';
  showGreeting(currentProfile);
  document.getElementById('msgInput').focus();
}

// ─── Mobile tabs ────────────────────────────────────────────────────────────
function switchMobileTab(tab) {
  const isChat = tab === 'chat';
  document.getElementById('chatPanel').classList.toggle('mob-hidden', !isChat);
  document.getElementById('menuPanel').classList.toggle('mob-hidden', isChat);
  document.getElementById('tab-chat').classList.toggle('active', isChat);
  document.getElementById('tab-menu').classList.toggle('active', !isChat);
}

// ─── Menu tabs ───────────────────────────────────────────────────────────────
function switchMenuTab(tab) {
  const isCurrent = tab === 'current';
  document.getElementById('menuTabCurrent').classList.toggle('active', isCurrent);
  document.getElementById('menuTabHistory').classList.toggle('active', !isCurrent);
  document.getElementById('menuCurrent').classList.toggle('hidden', !isCurrent);
  document.getElementById('menuHistory').classList.toggle('hidden', isCurrent);
  if (!isCurrent) loadMenuHistory();
}

// ─── Voice input ─────────────────────────────────────────────────────────────
function toggleMic() {
  if (micActive) { stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('このブラウザは音声入力に対応していません（Chrome推奨）'); return; }
  const rec = new SR();
  rec.lang = 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;
  const inp = document.getElementById('msgInput');
  let finalText = inp.value;
  rec.onstart = () => {
    micActive = true;
    recognition = rec;
    document.getElementById('micBtn').classList.add('active');
  };
  rec.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (final) finalText += final;
    inp.value = finalText + interim;
    autoResize(inp);
  };
  rec.onend = () => { inp.value = finalText; autoResize(inp); stopMic(); };
  rec.onerror = e => { if (e.error !== 'no-speech') showToast('音声認識エラー: ' + e.error); stopMic(); };
  try { rec.start(); } catch { showToast('マイクの起動に失敗しました'); }
}
function stopMic() {
  if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
  micActive = false;
  document.getElementById('micBtn').classList.remove('active');
}

// ─── Chat helpers ────────────────────────────────────────────────────────────
function coachInitial() {
  return (currentProfile?.coachName || 'P').slice(0, 1);
}

function addMessage(role, content, suggestions) {
  const container = document.getElementById('messages');
  // Remove any existing suggestion rows when user sends a new message
  if (role === 'user') {
    container.querySelectorAll('.suggestions-row').forEach(el => el.remove());
  }
  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;
  const avatar = role === 'coach' ? coachInitial() : 'C';
  row.innerHTML = `<div class="avatar ${role}">${avatar}</div>
    <div class="bubble ${role}">${h(content).replace(/\n/g, '<br>')}</div>`;
  container.appendChild(row);

  if (role === 'coach' && Array.isArray(suggestions) && suggestions.length) {
    const sr = document.createElement('div');
    sr.className = 'suggestions-row';
    suggestions.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = s;
      btn.onclick = () => { sr.remove(); quickSend(s); };
      sr.appendChild(btn);
    });
    container.appendChild(sr);
  }
  container.scrollTop = container.scrollHeight;
}

let typingRow = null;
function showTyping() {
  const container = document.getElementById('messages');
  typingRow = document.createElement('div');
  typingRow.className = 'bubble-row coach';
  typingRow.innerHTML = `<div class="avatar coach">${coachInitial()}</div><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  container.appendChild(typingRow);
  container.scrollTop = container.scrollHeight;
}
function hideTyping() {
  if (typingRow) { typingRow.remove(); typingRow = null; }
}

function setWaiting(v) {
  isWaiting = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('msgInput').disabled = v;
}

// ─── Menu result ─────────────────────────────────────────────────────────────
function renderMenuResult(s) {
  const el = document.getElementById('menuCurrent');
  const meta = s.meta;
  let html = `
    <div class="session-header">
      <div class="session-title">${h(s.title)}</div>
      <div class="session-meta">
        <span class="meta-chip">👥 ${meta.players}名</span>
        <span class="meta-chip">⏱ ${meta.duration}分</span>
        <span class="meta-chip">🎯 ${h(meta.theme)}</span>
        <span class="meta-chip">📌 ${h(meta.focus)}</span>
      </div>
    </div>
    <div class="narrative">${h(s.sessionNarrative).replace(/\n/g,'<br>')}</div>`;

  s.drills.forEach(drill => {
    const p = PHASE_LABEL[drill.phase] || { label: drill.phase, cls: 'phase-game' };
    const diagSvg = renderDiagramSVG(drill.diagram);
    html += `
      <div class="drill-card">
        <div class="drill-header">
          <span class="phase-badge ${p.cls}">${p.label}</span>
          <span class="drill-name">${h(drill.name)}</span>
          <span class="drill-time">⏱ ${drill.duration}分</span>
        </div>
        <div class="drill-body">
          <div class="drill-cols">
            <div>
              <div class="drill-section"><div class="section-label">目的</div><div class="section-content">${h(drill.objective)}</div></div>
              <div class="drill-section"><div class="section-label">やり方</div><div class="section-content">${h(drill.description)}</div></div>
              <div class="drill-section"><div class="section-label">オーガナイズ</div><div class="section-content">${h(drill.organization)}</div></div>
              <div class="coaching-focus">👁 ${h(drill.coachingFocus)}</div>
            </div>
            ${diagSvg ? `<div class="drill-diagram"><div class="diagram-label">フィールド図</div>${diagSvg}</div>` : ''}
            ${Array.isArray(drill.voiceCues) && drill.voiceCues.length ? `
            <div class="voice-cues">
              <div class="voice-cues-title">🎙 声かけ例</div>
              ${drill.voiceCues.map(c => `<div class="voice-cue-item">${h(c)}</div>`).join('')}
            </div>` : ''}
            ${Array.isArray(drill.troubleshooting) && drill.troubleshooting.length ? `
            <div class="troubleshoot">
              <div class="troubleshoot-title">🔧 うまくいかないときは</div>
              ${drill.troubleshooting.map(t => `<div class="trouble-item"><div class="trouble-problem">${h(t.problem)}</div><div class="trouble-solution">${h(t.solution)}</div></div>`).join('')}
            </div>` : ''}
            ${Array.isArray(drill.freezeMoments) && drill.freezeMoments.length ? `
            <div class="freeze-section">
              <div class="freeze-title">⏸ フリーズのタイミング</div>
              ${drill.freezeMoments.map(f => `<div class="freeze-item"><div class="freeze-trigger">${h(f.trigger)}</div><div class="freeze-coaching">${h(f.coaching)}</div></div>`).join('')}
            </div>` : ''}
            ${drill.connectionToNext ? `<div class="connection-note">→ ${h(drill.connectionToNext)}</div>` : ''}
          </div>
        </div>
      </div>`;
  });

  html += `<div class="coaching-points-card"><h3>🎙 コーチングポイント</h3>`;
  (s.coachingPoints || []).forEach(cp => {
    html += `<div class="cp-item"><div class="cp-point">▶ ${h(cp.point)}</div><div class="cp-phrase">${h(cp.examplePhrase)}</div></div>`;
  });
  html += `</div>`;
  html += `<div class="result-actions">
    <button class="btn-save" id="saveMenuBtn" onclick="saveMenu()">💾 保存する</button>
    <button class="btn-pdf" onclick="downloadPDF(lastMenuSession)">📄 PDF</button>
    <button class="btn-new" onclick="resetConversation()">🔄 新しく作る</button>
  </div>`;

  el.innerHTML = html;
  el.scrollTop = 0;
  switchMenuTab('current');
}

// ─── History ─────────────────────────────────────────────────────────────────
async function loadMenuHistory() {
  const el = document.getElementById('menuHistory');
  if (!el) return;
  el.innerHTML = '<div style="padding:20px;color:#bbb;text-align:center;font-size:13px">読み込み中...</div>';
  try {
    const res  = await fetch('/api/sessions');
    const json = await res.json();
    const cnt  = json.sessions?.length || 0;
    const cntEl = document.getElementById('historyCnt');
    if (cntEl) { cntEl.style.display = cnt > 0 ? 'inline-flex' : 'none'; cntEl.textContent = cnt; }
    if (!json.ok || !cnt) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">💾</div><div class="empty-title">保存済みメニューはありません</div><div class="empty-sub">メニュー生成後「💾 保存する」ボタンで蓄積されます</div></div>`;
      return;
    }
    el.innerHTML = `<div class="doc-section-title">保存済みメニュー（${cnt}件）</div>
      <div class="history-list">` +
      json.sessions.map(s => `
        <div class="history-item" onclick="openPastSession('${s.id.replace(/'/g,"\\'")}')">
          <div class="history-title">${h(s.title)}</div>
          <div class="history-meta">${h(s.teamName)} ${h(s.ageGroup)} · ${new Date(s.savedAt).toLocaleDateString('ja-JP')}</div>
        </div>`).join('') +
      `</div>`;
  } catch {
    el.innerHTML = '<div class="empty-state"><div class="empty-sub">読み込みに失敗しました</div></div>';
  }
}

async function saveMenu() {
  if (!lastMenuParams || !lastMenuSession) return;
  const btn = document.getElementById('saveMenuBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params: lastMenuParams, session: lastMenuSession }),
    });
    const json = await res.json();
    if (json.ok) {
      btn.textContent = '✅ 保存済み';
      showToast('💾 保存しました！');
      loadMenuHistory();
    }
  } catch {
    btn.disabled = false;
    btn.textContent = '💾 保存する';
  }
}

async function openPastSession(id) {
  try {
    const res  = await fetch(`/api/sessions/${encodeURIComponent(id)}`);
    const json = await res.json();
    if (!json.ok) return;
    const s = json.data.session;
    modalSession = s;
    document.getElementById('modalTitle').textContent = s.title;
    const tmp = document.createElement('div');
    renderMenuResultInto(s, tmp);
    document.getElementById('modalBody').innerHTML = tmp.innerHTML;
    document.getElementById('modalOverlay').classList.add('show');
  } catch (e) { console.error(e); }
}

function renderMenuResultInto(s, container) {
  const meta = s.meta;
  let html = `
    <div class="session-header">
      <div class="session-title">${h(s.title)}</div>
      <div class="session-meta">
        <span class="meta-chip">👥 ${meta.players}名</span>
        <span class="meta-chip">⏱ ${meta.duration}分</span>
        <span class="meta-chip">🎯 ${h(meta.theme)}</span>
      </div>
    </div>
    <div class="narrative">${h(s.sessionNarrative).replace(/\n/g,'<br>')}</div>`;
  s.drills.forEach(drill => {
    const p = PHASE_LABEL[drill.phase] || { label: drill.phase, cls: 'phase-game' };
    const diagSvg = renderDiagramSVG(drill.diagram);
    html += `<div class="drill-card">
      <div class="drill-header">
        <span class="phase-badge ${p.cls}">${p.label}</span>
        <span class="drill-name">${h(drill.name)}</span>
        <span class="drill-time">⏱ ${drill.duration}分</span>
      </div>
      <div class="drill-body"><div class="drill-cols">
        <div>
          <div class="drill-section"><div class="section-label">目的</div><div class="section-content">${h(drill.objective)}</div></div>
          <div class="drill-section"><div class="section-label">やり方</div><div class="section-content">${h(drill.description)}</div></div>

        </div>
        ${diagSvg ? `<div class="drill-diagram"><div class="diagram-label">フィールド図</div>${diagSvg}</div>` : ''}
        ${Array.isArray(drill.voiceCues) && drill.voiceCues.length ? `<div class="voice-cues"><div class="voice-cues-title">🎙 声かけ例</div>${drill.voiceCues.map(c=>`<div class="voice-cue-item">${h(c)}</div>`).join('')}</div>` : ''}
        ${Array.isArray(drill.troubleshooting) && drill.troubleshooting.length ? `<div class="troubleshoot"><div class="troubleshoot-title">🔧 うまくいかないときは</div>${drill.troubleshooting.map(t=>`<div class="trouble-item"><div class="trouble-problem">${h(t.problem)}</div><div class="trouble-solution">${h(t.solution)}</div></div>`).join('')}</div>` : ''}
        ${Array.isArray(drill.freezeMoments) && drill.freezeMoments.length ? `<div class="freeze-section"><div class="freeze-title">⏸ フリーズのタイミング</div>${drill.freezeMoments.map(f=>`<div class="freeze-item"><div class="freeze-trigger">${h(f.trigger)}</div><div class="freeze-coaching">${h(f.coaching)}</div></div>`).join('')}</div>` : ''}
      </div></div>
    </div>`;
  });
  html += `<div class="coaching-points-card"><h3>🎙 コーチングポイント</h3>`;
  (s.coachingPoints||[]).forEach(cp => {
    html += `<div class="cp-item"><div class="cp-point">▶ ${h(cp.point)}</div><div class="cp-phrase">${h(cp.examplePhrase)}</div></div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

// ─── SVG Field Diagram ────────────────────────────────────────────────────────
function renderDiagramSVG(diagram) {
  if (!diagram) return '';
  const isHalf = (diagram.fieldType || 'half') !== 'full';
  const W = 220, H = isHalf ? 150 : 280;
  const parts = [];

  parts.push(`<rect width="${W}" height="${H}" rx="4" fill="#3d8b37"/>`);

  if (isHalf) {
    parts.push(`<rect x="6" y="6" width="${W-12}" height="${H-6}" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.5"/>`);
    const gw = 52, gx = (W-gw)/2;
    parts.push(`<rect x="${gx}" y="6" width="${gw}" height="16" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.5"/>`);
    const pw = 110, px = (W-pw)/2;
    parts.push(`<rect x="${px}" y="6" width="${pw}" height="38" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1"/>`);
    parts.push(`<circle cx="${W/2}" cy="52" r="2.5" fill="rgba(255,255,255,.6)"/>`);
  } else {
    parts.push(`<rect x="6" y="6" width="${W-12}" height="${H-12}" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.5"/>`);
    parts.push(`<line x1="6" y1="${H/2}" x2="${W-6}" y2="${H/2}" stroke="rgba(255,255,255,.5)" stroke-width="1"/>`);
    parts.push(`<circle cx="${W/2}" cy="${H/2}" r="${H/11}" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1"/>`);
    parts.push(`<circle cx="${W/2}" cy="${H/2}" r="2.5" fill="rgba(255,255,255,.6)"/>`);
    const gw = 52, gx = (W-gw)/2;
    parts.push(`<rect x="${gx}" y="6" width="${gw}" height="14" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.5"/>`);
    parts.push(`<rect x="${gx}" y="${H-20}" width="${gw}" height="14" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.5"/>`);
  }

  const fx = x => Math.round(x / 100 * W);
  const fy = y => Math.round(y / 100 * H);

  (diagram.zones || []).forEach(z => {
    parts.push(`<rect x="${fx(z.x)}" y="${fy(z.y)}" width="${fx(z.w)}" height="${fy(z.h)}" fill="rgba(255,255,100,.12)" stroke="rgba(255,255,100,.5)" stroke-width="1" stroke-dasharray="4,3"/>`);
    if (z.label) parts.push(`<text x="${fx(z.x)+fx(z.w)/2}" y="${fy(z.y)+fy(z.h)/2}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="rgba(255,255,150,.9)">${h(z.label)}</text>`);
  });

  (diagram.cones || []).forEach(c => {
    const cx = fx(c.x), cy = fy(c.y);
    parts.push(`<polygon points="${cx},${cy-7} ${cx-4},${cy+4} ${cx+4},${cy+4}" fill="#FFC107" stroke="#E65100" stroke-width=".5"/>`);
  });

  (diagram.arrows || []).forEach(a => {
    const x1 = fx(a.x1), y1 = fy(a.y1), x2 = fx(a.x2), y2 = fy(a.y2);
    const color = a.type === 'pass' ? '#90CAF9' : '#FFB74D';
    const dash  = a.type === 'pass' ? 'stroke-dasharray="6,4"' : '';
    const ang = Math.atan2(y2-y1, x2-x1);
    const ex = x2 - 9*Math.cos(ang), ey = y2 - 9*Math.sin(ang);
    const ax1 = ex+5*Math.cos(ang+Math.PI/2), ay1 = ey+5*Math.sin(ang+Math.PI/2);
    const ax2 = ex-5*Math.cos(ang+Math.PI/2), ay2 = ey-5*Math.sin(ang+Math.PI/2);
    parts.push(`<line x1="${x1}" y1="${y1}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="2" ${dash} opacity=".9"/>`);
    parts.push(`<polygon points="${x2},${y2} ${ax1},${ay1} ${ax2},${ay2}" fill="${color}" opacity=".9"/>`);
  });

  const COLORS = { teamA: '#1a1a6e', teamB: '#c62828', neutral: '#e65100' };
  const drawC = (players, key) => (players || []).forEach(p => {
    const cx = fx(p.x), cy = fy(p.y), c = COLORS[key];
    const r = 8;
    parts.push(`<circle cx="${cx}" cy="${cy+1}" r="${r}" fill="rgba(0,0,0,.2)"/>`);
    parts.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}"/>`);
    parts.push(`<circle cx="${cx-2}" cy="${cy-2}" r="${r*.45}" fill="rgba(255,255,255,.2)"/>`);
    if (p.label) {
      const fs = p.label.length > 2 ? '5' : '6.5';
      parts.push(`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="${fs}" font-weight="bold" fill="white">${h(p.label)}</text>`);
    }
  });
  drawC(diagram.teamA,    'teamA');
  drawC(diagram.teamB,    'teamB');
  drawC(diagram.neutrals, 'neutral');

  if (diagram.notes) {
    const noteStr = String(diagram.notes);
    // Wrap to max 2 lines of ~28 chars each to prevent overflow
    const MAX = 28;
    const lines = [];
    let rem = noteStr;
    while (rem.length > 0 && lines.length < 2) {
      if (rem.length <= MAX) { lines.push(rem); rem = ''; }
      else {
        let cut = MAX;
        while (cut > 18 && rem[cut] !== ' ' && rem[cut] !== '、' && rem[cut] !== '。') cut--;
        if (cut <= 18) cut = MAX;
        lines.push(rem.slice(0, cut));
        rem = rem.slice(cut).trim();
      }
    }
    const noteH = lines.length === 1 ? 15 : 26;
    parts.push(`<rect x="0" y="${H-noteH}" width="${W}" height="${noteH}" fill="rgba(0,0,0,.45)"/>`);
    lines.forEach((line, i) => {
      const ty = H - noteH + 10 + i * 12;
      parts.push(`<text x="${W/2}" y="${ty}" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,.85)">${h(line)}</text>`);
    });
  }

  const usedNoteH = diagram.notes ? (String(diagram.notes).length > 28 ? 26 : 15) : 0;
  const legY = H - usedNoteH - 14;
  const drawLeg = (lx, ly, c) => parts.push(`<circle cx="${lx}" cy="${ly}" r="5" fill="${c}" opacity=".9"/>`);
  drawLeg(10, legY, '#1a1a6e');
  parts.push(`<text x="20" y="${legY+3}" font-size="7" fill="rgba(255,255,255,.75)">攻</text>`);
  drawLeg(40, legY, '#c62828');
  parts.push(`<text x="50" y="${legY+3}" font-size="7" fill="rgba(255,255,255,.75)">守</text>`);
  drawLeg(70, legY, '#e65100');
  parts.push(`<text x="80" y="${legY+3}" font-size="7" fill="rgba(255,255,255,.75)">中</text>`);

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;border-radius:8px;display:block">${parts.join('')}</svg>`;
}

// ─── Onboarding ───────────────────────────────────────────────────────────────
const OB_STEPS = [
  { id:'userCoachName', icon:'👤', title:'あなたのコーチ名は？', subtitle:'チャット内でのあなたの呼び名です', options:['田中コーチ','鈴木コーチ','山田コーチ'], placeholder:'例: 田中コーチ' },
  { id:'coachName',     icon:'🤖', title:'専属コーチの名前を決めよう！', subtitle:'あなたをサポートするAIコーチの名前です', options:['タクト','リベル','カンテラ'], placeholder:'好きな名前を入力（例: クロップ）' },
  { id:'soccerStyle',   icon:'⚽', title:'好きなサッカースタイルは？', subtitle:'チームの目指す方向性に合わせてメニューを提案します', options:['🇪🇸 パスサッカー（スペイン流）','🇧🇷 ドリブルサッカー（ブラジル流）','⚖️ バランス重視'], placeholder:'または自由に入力' },
  { id:'coachingStyle', icon:'🎯', title:'指導スタイルは？', subtitle:'コーチングポイントや練習の方向性に反映します', options:['📐 戦術を落とし込む（型を作る）','🕊️ 選手の自由を引き出す','📚 原理原則をたたき込む'], placeholder:'または自由に入力' },
];
let obStep = 0;
const obAnswers = {};

function showOnboarding() {
  document.getElementById('obOverlay').classList.add('show');
  renderObStep(0);
}

function renderObStep(idx) {
  obStep = idx;
  const step = OB_STEPS[idx];
  document.getElementById('ob-icon').textContent = step.icon;
  document.getElementById('ob-title').textContent = step.title;
  document.getElementById('ob-subtitle').textContent = step.subtitle;
  const inp = document.getElementById('ob-input');
  inp.value = '';
  inp.placeholder = step.placeholder;

  const choicesEl = document.getElementById('ob-choices');
  choicesEl.innerHTML = step.options.map((opt, i) =>
    `<button class="ob-choice" onclick="selectObChoice(this,'${opt.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${opt}</button>`
  ).join('');

  // progress indicators
  OB_STEPS.forEach((_, i) => {
    const el = document.getElementById(`ob-s${i+1}`);
    el.className = 'ob-step' + (i < idx ? ' done' : i === idx ? ' active' : '');
  });
  const btn = document.getElementById('ob-next');
  btn.textContent = idx < OB_STEPS.length - 1 ? '次へ →' : '始める！';
  btn.disabled = true;
}

function selectObChoice(btn, val) {
  document.querySelectorAll('.ob-choice').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Strip emoji prefix for storage (keep emoji in button but store clean text)
  const clean = val.replace(/^[^\w぀-鿿＀-￯]+\s*/, '');
  document.getElementById('ob-input').value = clean;
  document.getElementById('ob-next').disabled = false;
}

function updateNextBtn() {
  const val = document.getElementById('ob-input').value.trim();
  document.getElementById('ob-next').disabled = !val;
}

async function nextObStep() {
  const val = document.getElementById('ob-input').value.trim();
  if (!val) return;
  obAnswers[OB_STEPS[obStep].id] = val;

  if (obStep < OB_STEPS.length - 1) {
    renderObStep(obStep + 1);
  } else {
    await completeOnboarding();
  }
}

async function completeOnboarding() {
  const btn = document.getElementById('ob-next');
  btn.disabled = true;
  btn.textContent = '設定中...';
  try {
    const res = await fetch('/api/profile/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obAnswers),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    currentProfile = json.profile;
    updateTeamBadge(json.profile);
    document.getElementById('obOverlay').classList.remove('show');

    const { coachName, userCoachName, soccerStyle, coachingStyle } = obAnswers;
    const greeting = `${userCoachName}、${coachName}です！🔥\n\n${soccerStyle}で「${coachingStyle}」スタイルの指導をサポートします。一緒に最高のセッションを作りましょう！\n\nまずはチーム名と対象年代を教えてください。`;
    addMessage('coach', greeting, null);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '始める！';
    alert('設定の保存に失敗しました: ' + e.message);
  }
}

    body += `</div>`;
  }

  if (p.sessionCount || p.lastTheme) {
    body += `<div class="pp-section"><div class="pp-section-title">セッション記録</div>`;
    if (p.sessionCount) body += `<div class="pp-item"><div class="pp-label">累計</div><div class="pp-value">${p.sessionCount}回</div></div>`;
    if (p.lastTheme)    body += `<div class="pp-item"><div class="pp-label">前回テーマ</div><div class="pp-value">${h(p.lastTheme)}</div></div>`;
    if (p.lastSession)  body += `<div class="pp-item"><div class="pp-label">最終日</div><div class="pp-value">${h(p.lastSession)}</div></div>`;
    body += `</div>`;
  }

  if (!body) body = '<div class="pp-empty">まだ情報がありません。コーチと話すと自動的に蓄積されます。</div>';

  document.getElementById('ppBody').innerHTML = body;
  document.getElementById('profileOverlay').classList.add('show');
}

function closeProfileOverlay(e) {
  if (e.target === document.getElementById('profileOverlay')) closeProfileDirect();
}
function closeProfileDirect() {
  document.getElementById('profileOverlay').classList.remove('show');
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function h(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
