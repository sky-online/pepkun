<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #faf9f6;
    font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  }

  .wrap {
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-columns: 1fr 480px;
    align-items: center;
    padding: 64px 72px 64px 80px;
    gap: 40px;
    position: relative;
  }

  /* 左: テキスト */
  .left {}

  .label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #4a7c59;
    margin-bottom: 24px;
  }

  .headline {
    font-size: 68px;
    font-weight: 900;
    color: #111;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }

  .sub {
    font-size: 17px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 400px;
  }

  /* ロゴ/ブランド */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 900;
    color: #111;
    letter-spacing: -0.01em;
  }
  .brand-price {
    font-size: 14px;
    color: #888;
    border-left: 1px solid #ddd;
    padding-left: 12px;
    margin-left: 4px;
  }

  /* 右: フィールドSVG */
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 下部の細い線 */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #4a7c59;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="label">AI SOCCER TRAINING</div>
    <div class="headline">チームのことを<br>話すだけ。<br>練習メニューが<br>完成する。</div>
    <div class="sub">今日のテーマを伝えるだけで、ウォームアップからゲームまで5つのドリルが揃う。すべてのコーチに、名将の知恵を。</div>
    <div class="brand">
      <div class="brand-name">ペップ君</div>
      <div class="brand-price">無料で始められる / Pro 月500円</div>
    </div>
  </div>

  <div class="right">
    <!-- LP と同じフィールドSVG -->
    <svg width="440" height="310" viewBox="0 0 440 310" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- フィールド背景 -->
      <rect x="8" y="8" width="424" height="294" rx="6" fill="#f5f0e8" stroke="#b8c9b0" stroke-width="2"/>
      <!-- センターライン -->
      <line x1="220" y1="8" x2="220" y2="302" stroke="#b8c9b0" stroke-width="1.5"/>
      <!-- センターサークル -->
      <circle cx="220" cy="155" r="42" fill="none" stroke="#b8c9b0" stroke-width="1.5"/>
      <circle cx="220" cy="155" r="3" fill="#b8c9b0"/>
      <!-- 左ペナルティエリア -->
      <rect x="8" y="97" width="68" height="116" fill="none" stroke="#b8c9b0" stroke-width="1.5"/>
      <!-- 左ゴールエリア -->
      <rect x="8" y="123" width="30" height="64" fill="none" stroke="#b8c9b0" stroke-width="1.5"/>
      <!-- 右ペナルティエリア -->
      <rect x="364" y="97" width="68" height="116" fill="none" stroke="#b8c9b0" stroke-width="1.5"/>
      <!-- 右ゴールエリア -->
      <rect x="402" y="123" width="30" height="64" fill="none" stroke="#b8c9b0" stroke-width="1.5"/>

      <!-- チームA (ダーク・攻撃側) -->
      <circle cx="160" cy="200" r="10" fill="#3d6b4f"/>
      <circle cx="200" cy="155" r="10" fill="#3d6b4f"/>
      <circle cx="170" cy="120" r="10" fill="#3d6b4f"/>
      <circle cx="240" cy="175" r="10" fill="#3d6b4f"/>

      <!-- チームB (ピンク・守備側) -->
      <circle cx="310" cy="145" r="10" fill="#c07070" opacity="0.85"/>
      <circle cx="340" cy="185" r="10" fill="#c07070" opacity="0.85"/>
      <circle cx="290" cy="185" r="10" fill="#c07070" opacity="0.85"/>

      <!-- パスライン（破線） -->
      <line x1="160" y1="200" x2="200" y2="155" stroke="#3d6b4f" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
      <line x1="200" y1="155" x2="310" y2="145" stroke="#3d6b4f" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>

      <!-- ランライン（実線・矢印） -->
      <line x1="240" y1="175" x2="345" y2="140" stroke="#c07070" stroke-width="2.5" opacity="0.8"/>
      <polygon points="345,140 333,136 337,148" fill="#c07070" opacity="0.8"/>

      <!-- フォーカスゾーン -->
      <circle cx="200" cy="155" r="28" fill="none" stroke="#3d6b4f" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    </svg>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
